<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>新規登録</title>
	<link rel="stylesheet" type="text/css" href="/css/style.css">
</head>

<body class="page-login">
	<div class="login-screen">
		<h1>新規登録</h1>

		<div th:if="${errorList}" class="error">
			<th:block th:each="error:${errorList}">
				<span th:text="${error}"></span><br>
			</th:block>
		</div>

		<form action="/users/add" method="post" class="login-form">

			<div class="login-form">
				<input type="text" name="name" th:value="${name}" placeholder="ユーザー名">
				<input type="password" name="password" placeholder="パスワード">
				<input type="password" name="passwordConfirm" placeholder="パスワード確認">
			</div>

			<button type="submit" class="login-form btn">登録</button>

			<a class="login-link" href="/login">ログイン画面に戻る</a>
		</form>
	</div>
</body>

</html>
