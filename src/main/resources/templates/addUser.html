<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>新規登録</title>
	<link rel="stylesheet" type="text/css" href="/css/style.css">
</head>

<body class="page-login">

	<div class="login">
		<div class="login-screen" style="padding: 25px;">
			<div class="app-title">
				<h1>新規登録</h1>
			</div>

			<span th:text="${error}" class="control-group"
				style="color: rgb(128, 0, 0); display: block; text-align: center; margin-bottom: 10px;"></span>

			<form action="/users/add" method="post" class="login-form">


				<div class="control-group">
					<input type="text" class="login-field" name="name" th:value="${name}" placeholder="ユーザー名"
						id="login-name">
					<label class="login-field-icon fui-user" for="login-name"></label>
				</div>

				<div class="control-group">
					<input type="password" class="login-field" name="password" placeholder="パスワード" id="login-pass">
					<label class="login-field-icon fui-lock" for="login-pass"></label>
				</div>

				<div class="control-group">
					<input type="password" class="login-field" name="passwordConfirm" placeholder="パスワード確認"
						id="login-pass-confirm">
					<label class="login-field-icon fui-lock" for="login-pass-confirm"></label>
				</div>

				<button type="submit" class="btn btn-primary btn-large btn-block">登録</button>

				<a class="login-link" href="/tasks">ログイン画面に戻る</a>
			</form>
		</div>
	</div>

</body>

</html>
