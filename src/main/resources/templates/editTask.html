<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>タスク内容変更</title>
</head>

<body>

	<h1>タスク内容変更</h1>

	<form th:action="@{/tasks/{taskId}/edit(taskId=${task.taskId})}" method="post">
		<input type="hidden" name="categoryId" th:value="${task.categoryId}">
		<table border="1">
			<tr>
				<th>カテゴリー</th>

				<td>
					<input type="radio" id="1" name="categoryId" th:value="${task.categoryId}">
					<label for="1">仕事</label>

					<input type="radio" id="2" name="categoryId" th:value="${task.categoryId}">
					<label for="2">日常</label><br>
				</td>
			</tr>
			<tr>
				<th>タイトル</th>
				<td>
					<input type="text" name="title" th:value="${task.title}">
				</td>
			</tr>
			<tr>
				<th>進捗状況</th>

				<td>
					<select name="progress">
						<option value="0" th:selected="${task.progress == 0}">未着手</option>
						<option value="1" th:selected="${task.progress == 1}">進行中</option>
						<option value="2" th:selected="${task.progress == 2}">完了</option>
					</select>
				</td>
			</tr>
			<tr>
				<th>開始日</th>
				<td>
					<input type="date" name="date" th:value="${task.date}">
				</td>
			</tr>
			<tr>
				<th>期限</th>
				<td>
					<input type="date" name="closingDate" th:value="${task.closingDate}">
				</td>
			</tr>
			<tr>
				<th>予定所要時間(分)</th>
				<td>
					<input type="text" name="time" th:value="${task.time}">
				</td>
			</tr>
			<tr>
				<th>備考</th>
				<td>
					<input type="textarea" name="memo" th:value="${task.memo}">
				</td>
			</tr>
			</table>
			<button>変更</button>
		</form>

</body>

</html>
